<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Grayscale Background: Rich dark charcoal to pure black -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C1E" />
      <stop offset="100%" stop-color="#0A0A0C" />
    </linearGradient>

    <!-- Subtle Accent Glow: Clean white sheen -->
    <radialGradient id="accent-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- iOS Squircle background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg-grad)" />
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#accent-glow)" />

  <!-- Dotted Clock Arc -->
  <path
    d="M 50 24 A 26 26 0 0 1 76 50"
    stroke="#FFFFFF"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-dasharray="3.5 4.5"
    opacity="0.45"
  />

  <!-- Geometric G-Shield -->
  <path
    d="M 50 24 C 35.64 24, 24 35.64, 24 50 C 24 63.5, 35 74.5, 50 76.5 C 65 74.5, 76 63.5, 76 50 L 52 50"
    stroke="#FFFFFF"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Clock Center Hub -->
  <circle cx="50" cy="50" r="4" fill="#FFFFFF" />

  <!-- Clock Hand -->
  <line
    x1="50"
    y1="50"
    x2="60"
    y2="40"
    stroke="#FFFFFF"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- AI Sparkle Star -->
  <path
    d="M 68 18 C 68 22.4, 64.4 26, 60 26 C 64.4 26, 68 29.6, 68 34 C 68 29.6, 71.6 26, 76 26 C 71.6 26, 68 22.4, 68 18 Z"
    fill="#FFFFFF"
  />
</svg>
